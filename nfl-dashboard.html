<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Analytics – Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{--bg:#0a0e17;--card:#111827;--card2:#1a2235;--border:#1e2d45;--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--green:#22c55e;--text:#e2e8f0;--text-dim:#64748b;--text-mid:#94a3b8;--accent:#38bdf8;--yellow:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;min-height:100vh;overflow-x:hidden}
.topnav{background:rgba(10,14,23,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:32px;position:sticky;top:0;z-index:100;height:52px}
.logo{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.logo span{color:var(--text-dim);font-weight:400}
.nav-links{display:flex;gap:4px}
.nav-link{font-family:'Oswald',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);padding:6px 14px;border-radius:4px;cursor:pointer;border:none;background:none;transition:all 0.2s;text-decoration:none}
.nav-link:hover{color:var(--text);background:var(--card2)}
.nav-link.active{color:var(--accent);background:rgba(56,189,248,0.1)}

.tab-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex}
.tab{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:13px 20px;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all 0.2s;position:relative;top:1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.page{padding:24px;max-width:1400px;margin:0 auto;display:none}
.page.active{display:block}

/* CONTROLS */
.controls-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-label{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);white-space:nowrap}
select{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:13px;padding:7px 10px;border-radius:6px;outline:none;cursor:pointer;transition:border-color 0.2s}
select:focus{border-color:var(--accent)}
.filter-btns{display:flex;gap:4px}
.filter-btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.5px;padding:7px 12px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:rgba(56,189,248,0.1);border-color:var(--accent);color:var(--accent)}
.season-btns{display:flex;gap:4px;flex-wrap:wrap}
.season-btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;padding:7px 11px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.season-btn:hover{border-color:var(--accent);color:var(--text)}
.season-btn.active{background:rgba(56,189,248,0.1);border-color:var(--accent);color:var(--accent)}

/* STANDINGS */
.standings-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.standings-card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.standings-card-header h2{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.standings-meta{font-size:12px;color:var(--text-dim)}
table.standings{width:100%;border-collapse:collapse;font-size:13px}
table.standings thead th{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);padding:10px 16px;text-align:right;background:var(--card2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color 0.2s}
table.standings thead th:first-child{text-align:left;width:30px}
table.standings thead th:nth-child(2){text-align:left}
table.standings thead th:hover{color:var(--accent)}
table.standings thead th.sort-asc::after{content:' ↑';color:var(--accent)}
table.standings thead th.sort-desc::after{content:' ↓';color:var(--accent)}
table.standings tbody tr{border-bottom:1px solid rgba(30,45,69,0.5);transition:background 0.15s}
table.standings tbody tr:hover{background:rgba(255,255,255,0.02)}
table.standings tbody tr:last-child{border-bottom:none}
table.standings tbody td{padding:10px 16px;text-align:right;color:var(--text-mid)}
table.standings tbody td:first-child{text-align:left;color:var(--text-dim);font-family:'Oswald',sans-serif;font-size:12px;font-weight:600}
table.standings tbody td:nth-child(2){text-align:left;font-weight:600;color:var(--text)}
.pct-bar-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.pct-bar-bg{width:60px;height:4px;background:var(--card2);border-radius:2px;overflow:hidden}
.pct-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:2px}
.diff-pos{color:var(--green);font-weight:600}
.diff-neg{color:var(--red)}
.diff-zero{color:var(--text-dim)}
.div-header td{background:rgba(56,189,248,0.04);font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);padding:6px 16px !important;text-align:left !important;border-top:1px solid var(--border)}

/* HOME/AWAY CHART */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.chart-card-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.chart-card-header h2{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.chart-meta{font-size:12px;color:var(--text-dim)}
.chart-body{padding:16px 18px 18px}

.legend-row{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--text-dim)}
.legend-dot{width:12px;height:12px;border-radius:2px}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
.fade-in{animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo">NFL<span>analytics</span></div>
  <div class="nav-links">
    <span class="nav-link active" id="navStandings" onclick="switchTab('standings')">Standings</span>
    <span class="nav-link" id="navHomeaway" onclick="switchTab('homeaway')">Home/Away</span>
    <a href="player-props.html" class="nav-link">Props</a>
  </div>
</nav>

<div class="tab-bar">
  <button class="tab active" data-tab="standings">Standings</button>
  <button class="tab" data-tab="homeaway">Home / Away</button>
</div>

<!-- STANDINGS PAGE -->
<div class="page active" id="page-standings">
  <div class="controls-bar">
    <div class="ctrl-group">
      <span class="ctrl-label">Season</span>
      <div class="season-btns" id="standingsSeasonBtns"></div>
    </div>
    <div class="ctrl-group" style="margin-left:auto">
      <span class="ctrl-label">Show</span>
      <div class="filter-btns" id="standingsConfBtns">
        <button class="filter-btn active" data-conf="ALL">All Teams</button>
        <button class="filter-btn" data-conf="AFC">AFC</button>
        <button class="filter-btn" data-conf="NFC">NFC</button>
      </div>
    </div>
  </div>
  <div class="standings-card fade-in">
    <div class="standings-card-header">
      <h2 id="standingsTitle">NFL Standings</h2>
      <span class="standings-meta" id="standingsMeta"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="standings" id="standingsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th data-col="w">W</th>
            <th data-col="l">L</th>
            <th data-col="t">T</th>
            <th data-col="pct">PCT</th>
            <th data-col="pf">PF</th>
            <th data-col="pa">PA</th>
            <th data-col="diff">DIFF</th>
          </tr>
        </thead>
        <tbody id="standingsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- HOME/AWAY PAGE -->
<div class="page" id="page-homeaway">
  <div class="controls-bar">
    <div class="ctrl-group">
      <span class="ctrl-label">Season</span>
      <div class="season-btns" id="haSeasonBtns"></div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Show Teams</span>
      <select id="haTeamFilter">
        <option value="ALL">All Teams</option>
        <option value="AFC">AFC</option>
        <option value="NFC">NFC</option>
        <optgroup label="AFC">
          <option value="AFC East">AFC East</option>
          <option value="AFC North">AFC North</option>
          <option value="AFC South">AFC South</option>
          <option value="AFC West">AFC West</option>
        </optgroup>
        <optgroup label="NFC">
          <option value="NFC East">NFC East</option>
          <option value="NFC North">NFC North</option>
          <option value="NFC South">NFC South</option>
          <option value="NFC West">NFC West</option>
        </optgroup>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">vs Opponent</span>
      <select id="haOppFilter">
        <option value="ALL">All Opponents</option>
        <option value="AFC">vs AFC</option>
        <option value="NFC">vs NFC</option>
        <optgroup label="AFC">
          <option value="AFC East">vs AFC East</option>
          <option value="AFC North">vs AFC North</option>
          <option value="AFC South">vs AFC South</option>
          <option value="AFC West">vs AFC West</option>
        </optgroup>
        <optgroup label="NFC">
          <option value="NFC East">vs NFC East</option>
          <option value="NFC North">vs NFC North</option>
          <option value="NFC South">vs NFC South</option>
          <option value="NFC West">vs NFC West</option>
        </optgroup>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Venue</span>
      <div class="filter-btns" id="haVenueBtns">
        <button class="filter-btn active" data-venue="ALL">All Games</button>
        <button class="filter-btn" data-venue="HOME">Home</button>
        <button class="filter-btn" data-venue="AWAY">Away</button>
      </div>
    </div>
  </div>
  <div class="chart-card fade-in">
    <div class="chart-card-header">
      <h2>Win / Loss Record by Team</h2>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Wins</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Losses</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--text-dim)"></div>Ties</div>
      </div>
      <span class="chart-meta" id="haMeta"></span>
    </div>
    <div class="chart-body">
      <canvas id="haChart"></canvas>
    </div>
  </div>
</div>

// ── COMPUTE STANDINGS ──
function computeStandings(season, confFilter) {
  const games = SCHEDULE.filter(g => g.season === season);
  const records = {};
  Object.keys(TEAMS).forEach(t => {
    records[t] = {team: t, w: 0, l: 0, tie: 0, pf: 0, pa: 0};
  });
  games.forEach(g => {
    const h = g.home_team, a = g.away_team;
    const hs = g.home_score, as = g.away_score;
    records[h].pf += hs; records[h].pa += as;
    records[a].pf += as; records[a].pa += hs;
    if (hs > as) { records[h].w++; records[a].l++; }
    else if (as > hs) { records[a].w++; records[h].l++; }
    else { records[h].tie++; records[a].tie++; }
  });
  let teams = Object.values(records);
  if (confFilter !== 'ALL') teams = teams.filter(t => TEAMS[t.team].conf === confFilter);
  teams.forEach(t => {
    const gp = t.w + t.l + t.tie;
    t.pct = gp > 0 ? (t.w + t.tie * 0.5) / gp : 0;
    t.diff = t.pf - t.pa;
    t.conf = TEAMS[t.team].conf;
    t.div = TEAMS[t.team].div;
  });
  return teams;
}

// ── RENDER STANDINGS ──
function renderStandings() {
  const teams = computeStandings(standingsSeason, standingsConf);
  const col = standingsSort.col, dir = standingsSort.dir;
  teams.sort((a, b) => {
    let av = a[col], bv = b[col];
    return dir === 'desc' ? bv - av : av - bv;
  });

  // Update sort indicators
  document.querySelectorAll('#standingsTable thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) th.classList.add(dir === 'desc' ? 'sort-desc' : 'sort-asc');
  });

  const showDivHeaders = standingsConf === 'ALL' && standingsSort.col === 'pct';
  let html = '';
  let lastDiv = null;

  if (showDivHeaders) {
    // Group by division sorted by pct
    const byDiv = {};
    DIV_ORDER.forEach(d => byDiv[d] = []);
    teams.forEach(t => { if (byDiv[t.div]) byDiv[t.div].push(t); });
    DIV_ORDER.forEach(div => {
      const divTeams = byDiv[div].sort((a,b) => b.pct - a.pct);
      html += `<tr class="div-header"><td colspan="9">${div}</td></tr>`;
      divTeams.forEach((t, i) => { html += teamRow(t, i + 1); });
    });
  } else {
    teams.forEach((t, i) => { html += teamRow(t, i + 1); });
  }

  document.getElementById('standingsBody').innerHTML = html;
  document.getElementById('standingsTitle').textContent =
    standingsConf === 'ALL' ? `NFL Standings — ${standingsSeason}` : `${standingsConf} Standings — ${standingsSeason}`;
  document.getElementById('standingsMeta').textContent = `${teams.length} teams`;
}

function teamRow(t, rank) {
  const gp = t.w + t.l + t.tie;
  const pctStr = t.pct.toFixed(3).replace(/^0/, '');
  const diffCls = t.diff > 0 ? 'diff-pos' : t.diff < 0 ? 'diff-neg' : 'diff-zero';
  const diffStr = t.diff > 0 ? '+' + t.diff : t.diff;
  return `<tr>
    <td>${rank}</td>
    <td>${t.team}</td>
    <td>${t.w}</td>
    <td>${t.l}</td>
    <td>${t.tie}</td>
    <td>
      <div class="pct-bar-wrap">
        <span>${pctStr}</span>
        <div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${(t.pct*100).toFixed(1)}%"></div></div>
      </div>
    </td>
    <td>${t.pf}</td>
    <td>${t.pa}</td>
    <td class="${diffCls}">${diffStr}</td>
  </tr>`;
}

// ── HOME/AWAY CHART ──
function getHARecords() {
  const games = SCHEDULE.filter(g => g.season === haSeason);
  const records = {};
  Object.keys(TEAMS).forEach(t => { records[t] = {w:0, l:0, tie:0}; });

  games.forEach(g => {
    const ht = g.home_team, at = g.away_team;
    const hs = g.home_score, as_ = g.away_score;
    const hConf = TEAMS[ht]?.conf, aConf = TEAMS[at]?.conf;
    const hDiv = TEAMS[ht]?.div, aDiv = TEAMS[at]?.div;

    // Check opponent filter for each team
    function oppMatch(oppTeam) {
      if (haOppFilter === 'ALL') return true;
      const oppConf = TEAMS[oppTeam]?.conf;
      const oppDiv = TEAMS[oppTeam]?.div;
      if (haOppFilter === 'AFC' || haOppFilter === 'NFC') return oppConf === haOppFilter;
      return oppDiv === haOppFilter;
    }

    // HOME team perspective
    if (haVenue !== 'AWAY' && oppMatch(at)) {
      if (hs > as_) records[ht].w++;
      else if (as_ > hs) records[ht].l++;
      else records[ht].tie++;
    }
    // AWAY team perspective
    if (haVenue !== 'HOME' && oppMatch(ht)) {
      if (as_ > hs) records[at].w++;
      else if (hs > as_) records[at].l++;
      else records[at].tie++;
    }
  });

  // Filter teams
  let teams = Object.keys(TEAMS).filter(t => {
    if (haTeamFilter === 'ALL') return true;
    if (haTeamFilter === 'AFC' || haTeamFilter === 'NFC') return TEAMS[t].conf === haTeamFilter;
    return TEAMS[t].div === haTeamFilter;
  });

  // Sort by win pct
  teams.sort((a, b) => {
    const ra = records[a], rb = records[b];
    const ta = ra.w + ra.l + ra.tie, tb = rb.w + rb.l + rb.tie;
    const pa = ta > 0 ? (ra.w + ra.tie * 0.5) / ta : 0;
    const pb = tb > 0 ? (rb.w + rb.tie * 0.5) / tb : 0;
    return pb - pa;
  });

  return { teams, records };
}

    options: {

      plugins: {

          color: '#fff',

          formatter: v => v > 0 ? v : '',

        },
